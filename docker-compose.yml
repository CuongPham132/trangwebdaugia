services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: auction-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: auction-db-init
    depends_on:
      db:
        condition: service_started
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      DB_NAME: ${DB_NAME:-dau_gia}
    volumes:
      - ./dau_gia.sql:/scripts/dau_gia.sql:ro
      - ./docker/init-db.sh:/scripts/init-db.sh:ro
    entrypoint: ["/bin/bash", "/scripts/init-db.sh"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auction-backend
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      DB_SERVER: db
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      DB_NAME: ${DB_NAME:-dau_gia}
      DB_PORT: 1433
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: auction-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mssql-data:
